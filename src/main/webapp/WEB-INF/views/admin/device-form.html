<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main-layout :: appHead(${pageTitle})}"></head>
<body class="bg-light">

<header th:replace="~{layout/main-layout :: appHeader}"></header>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0 bg-white shadow-sm min-vh-100">
            <div class="p-3 border-bottom text-center">
                <span class="badge bg-danger mb-2">QUẢN TRỊ VIÊN</span><br>
                <span class="fw-bold text-primary">Admin System</span>
            </div>
            <ul class="nav flex-column py-2">
                <li class="nav-item">
                    <a class="nav-link text-dark px-3 py-2" th:href="@{/admin/dashboard}">
                        Tổng quan
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-primary fw-bold bg-light border-end border-primary border-3 px-3 py-2" th:href="@{/admin/devices}">
                        Quản lý Thiết bị/Lab
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark px-3 py-2" th:href="@{/admin/requests}">
                        Yêu cầu mượn
                    </a>
                </li>
            </ul>
        </div>

        <main class="col-md-9 col-lg-10 p-4">

            <div class="mb-3">
                <a th:href="@{/admin/devices}" class="text-decoration-none text-secondary">
                    &larr; Quay lại danh sách
                </a>
            </div>

            <div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
                <div class="card-header bg-white border-bottom pt-4 pb-3">
                    <h4 class="mb-0 text-primary" th:text="${pageTitle}">Thông tin Thiết bị</h4>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{${submitUrl}}" th:object="${deviceForm}" method="POST">

                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên Thiết bị / Phòng Lab <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                   placeholder="VD: Màn hình Dell 24 inch...">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Link Ảnh Minh Họa <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{image}"
                                   th:classappend="${#fields.hasErrors('image')} ? 'is-invalid' : ''"
                                   placeholder="Nhập đường dẫn URL của ảnh...">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Tổng số lượng tồn kho <span class="text-danger">*</span></label>
                            <input type="number" class="form-control"
                                   th:field="*{quantity}"
                                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid' : ''"
                                   placeholder="Nhập số lượng...">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-4 mt-2">
                            <a th:href="@{/admin/devices}" class="btn btn-outline-secondary">Huỷ bỏ</a>
                            <button type="submit" class="btn btn-primary px-4">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<footer th:replace="~{layout/main-layout :: appFooter}"></footer>

</body>
</html>
