<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="appHead(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Portal Quan Ly Muon Tra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header th:fragment="appHeader" class="border-bottom bg-white shadow-sm">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/student/devices}">IT Lab Portal</a>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/student/devices}">Sinh vien</a>
                <a class="btn btn-outline-secondary btn-sm disabled" href="#">Admin</a>
            </div>
        </div>
    </nav>
</header>

<div th:fragment="flashMessage" class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">Dang ky thanh cong.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<footer th:fragment="appFooter" class="border-top bg-white mt-5">
    <div class="container py-3 text-center text-muted small">
        He thong Quan ly Muon/Tra Thiet bi IT va Phong Lab
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</footer>
</body>
</html>
